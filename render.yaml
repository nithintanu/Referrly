databases:
  - name: referrly-db
    databaseName: referrly_db
    plan: free
    user: referrly_user

services:
  - type: web
    name: referrly-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run db:generate && npm run build
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: referrly-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: 5242880

  - type: web
    name: referrly-web
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm install -g serve && serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        sync: false
