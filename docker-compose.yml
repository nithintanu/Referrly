version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: referrly-db
    environment:
      POSTGRES_USER: ${DB_USER:-referrly_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-referrly_password}
      POSTGRES_DB: ${DB_NAME:-referrly_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - referrly-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-referrly_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: referrly-backend
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-referrly_user}:${DB_PASSWORD:-referrly_password}@postgres:5432/${DB_NAME:-referrly_db}"
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - referrly-network
    command: sh -c "npm run db:push && npm run db:seed && npm start"
    volumes:
      - ./backend/src:/app/src

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: referrly-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - referrly-network
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  referrly-network:
    driver: bridge
